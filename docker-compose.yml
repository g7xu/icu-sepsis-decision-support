services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      - DEBUG=True    # runserver serves static files in debug mode
    volumes:
      - .:/code
      - static_files:/code/staticfiles  # preserve collectstatic output from build
    ports:
      - "8000:8000"
    # Connects to AWS RDS via .env (DB_HOST, DB_PASSWORD, etc.)

  # Local Postgres — uncomment if you need a local database instead of AWS RDS
  # db:
  #   image: postgres:14
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #     - POSTGRES_DB=sepsis
  #   ports:
  #     - "5434:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d sepsis"]
  #     interval: 2s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 10s

volumes:
  static_files:
