{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICU Sepsis Decision Support{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="app-navbar">
        <div class="app-navbar__brand">
            <h1>ICU Sepsis Decision Support</h1>
        </div>
        {% block navbar_clock %}{% endblock %}
    </nav>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <div id="app-config" class="hidden" data-csrf-token="{{ csrf_token }}" data-advance-url="{% url 'patients:advance_time' %}"></div>
    <script>
    (function() {
        var advanceBtn = document.getElementById('advance-btn');
        var config = document.getElementById('app-config');
        if (!advanceBtn || !config) return;
        var ds = config.dataset;

        // Cross-tab sync: when +1 is clicked in any tab, all tabs show "..." and reload
        var channel = typeof BroadcastChannel !== 'undefined'
            ? new BroadcastChannel('icu-sepsis-advance')
            : null;

        var isProcessing = false;

        function setAdvanceLoading(loading) {
            isProcessing = loading;
            if (advanceBtn) {
                advanceBtn.disabled = loading;
                advanceBtn.textContent = loading ? '...' : '+1';
            }
            // Store state in sessionStorage for new tabs
            try {
                if (loading) {
                    sessionStorage.setItem('advance_loading', Date.now().toString());
                } else {
                    sessionStorage.removeItem('advance_loading');
                }
            } catch (e) {}
        }

        // Check if advance is in progress when tab loads (with timeout protection)
        try {
            var loadingTimestamp = sessionStorage.getItem('advance_loading');
            if (loadingTimestamp) {
                var age = Date.now() - parseInt(loadingTimestamp, 10);
                // Only show loading if timestamp is recent (< 60 seconds)
                if (age < 60000) {
                    setAdvanceLoading(true);
                    // Ask other tabs if they're still processing
                    if (channel) {
                        channel.postMessage('advance_status_request');
                        // If no response in 2 seconds, assume stale state
                        setTimeout(function() {
                            if (isProcessing && !advanceBtn.classList.contains('confirmed-processing')) {
                                setAdvanceLoading(false);
                            }
                        }, 2000);
                    }
                } else {
                    // Stale state, clear it
                    sessionStorage.removeItem('advance_loading');
                }
            }
        } catch (e) {}

        if (channel) {
            channel.onmessage = function(e) {
                if (e.data === 'advance_started') {
                    setAdvanceLoading(true);
                    if (advanceBtn) advanceBtn.classList.add('confirmed-processing');
                } else if (e.data === 'advance_done') {
                    sessionStorage.removeItem('advance_loading');
                    location.reload();
                } else if (e.data === 'advance_status_request') {
                    // Respond if this tab is processing
                    if (isProcessing && advanceBtn && advanceBtn.disabled) {
                        channel.postMessage('advance_in_progress');
                    }
                } else if (e.data === 'advance_in_progress') {
                    setAdvanceLoading(true);
                    if (advanceBtn) advanceBtn.classList.add('confirmed-processing');
                }
            };
        }

        advanceBtn.addEventListener('click', function() {
            if (advanceBtn.classList.contains('confirmed-processing')) {
                advanceBtn.classList.remove('confirmed-processing');
            }
            setAdvanceLoading(true);
            if (channel) channel.postMessage('advance_started');

            fetch(ds.advanceUrl, {
                method: 'POST',
                headers: { 'X-CSRFToken': ds.csrfToken },
            })
            .then(function(r) {
                if (!r.ok) {
                    return r.text().then(function(t) {
                        var msg = 'HTTP ' + r.status;
                        if (t && t.length < 300) msg += ': ' + t.substring(0, 300);
                        else if (t) msg += ' (see console)';
                        console.error('Advance time failed:', r.status, t);
                        throw new Error(msg);
                    });
                }
                return r.json();
            })
            .then(function(data) {
                var el = document.getElementById('current-time');
                if (el && data.current_time) el.textContent = data.current_time;
                setAdvanceLoading(false);
                if (channel) channel.postMessage('advance_done');
                location.reload();
            })
            .catch(function(err) {
                setAdvanceLoading(false);
                if (channel) channel.postMessage('advance_done');
                alert('Error advancing time: ' + err.message);
            });
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
