{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICU Sepsis Decision Support{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <h1>ICU Sepsis Decision Support</h1>
        <span class="subtitle">Clinical Decision Support System</span>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Hidden state element injected by each page template -->
    {% block sim_state %}{% endblock %}

    <!-- Simulation Clock Dock — fixed top-right, shared across all pages -->
    <!-- URL data attributes are resolved here (server-side) so sim-dock.js can remain a static file -->
    <div class="sim-dock" id="sim-dock"
         data-url-status="{% url 'patients:simulation_status' %}"
         data-url-pause="{% url 'patients:pause' %}"
         data-url-play="{% url 'patients:play' %}"
         data-url-advance="{% url 'patients:advance_time' %}"
         data-url-rewind="{% url 'patients:rewind_time' %}"
         data-url-reset="{% url 'patients:reset' %}">
        <div class="sim-dock-controls">
            <span class="sim-dock-time" id="dock-time">–</span>
            <button class="dock-btn dock-btn-reset" id="dock-reset" title="Reset simulation">&#8635;</button>
            <button class="dock-btn" id="dock-rewind" title="Auto-rewind">&#9664;&#9664;</button>
            <button class="dock-btn dock-btn-play" id="dock-play">&#9654; Play</button>
            <button class="dock-btn" id="dock-forward" title="Fast-forward 2&#215;">&#9654;&#9654;</button>
            <select class="dock-select" id="dock-speed" title="Speed per simulated hour">
                <option value="1">1s/hr</option>
                <option value="5" selected>5s/hr</option>
                <option value="10">10s/hr</option>
                <option value="30">30s/hr</option>
            </select>
            <button class="dock-btn" id="dock-back" title="Step back 1 hour">&#8592; -1</button>
            <button class="dock-btn" id="dock-fwd" title="Step forward 1 hour">+1 &#8594;</button>
        </div>
        <div class="sim-dock-status" id="dock-status"></div>
    </div>

    <script src="{% static 'js/sim-dock.js' %}"></script>
</body>
</html>
